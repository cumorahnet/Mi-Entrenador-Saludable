<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    <title>Mi Entrenador Saludable</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif; background-color: #020617; color: white;
            margin: 0; padding: 0; overflow: hidden; -webkit-tap-highlight-color: transparent;
            position: fixed; width: 100%; height: 100%;
        }
        #root { height: 100%; width: 100%; display: flex; flex-direction: column; }
        .glass-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .timer-huge {
            font-size: 60vw; line-height: 0.75; font-weight: 900;
            letter-spacing: -0.06em; color: #000; pointer-events: none;
        }
        @media (orientation: landscape) { .timer-huge { font-size: 75vh; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const IconPlay    = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>;
        const IconPause   = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>;
        const IconRotate  = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M1 4v6h6M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>;
        const IconBack    = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>;
        const IconForward = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6zM16 6v12h2V6z"/></svg>;

        const firebaseConfig = {
            apiKey: "AIzaSyDg0nohFAprIYta3Z3IvFGms55PehyxGIM",
            authDomain: "entrenadorpersonal-4e69d.firebaseapp.com",
            projectId: "entrenadorpersonal-4e69d",
            storageBucket: "entrenadorpersonal-4e69d.firebasestorage.app",
            messagingSenderId: "198872357236",
            appId: "1:198872357236:web:c3cd2a7f5caff197847421"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db   = firebase.firestore();

        const APP_ID = "mientrenador-v3";
        const APP_TITLE = "Mi Entrenador Saludable";
        const APP_VERSION = "52.0.0";

        const WARMUP_STEPS = [
            { label: 'TOBILLO DERECHO', voice: 'Tobillo derecho' },
            { label: 'TOBILLO IZQUIERDO', voice: 'Tobillo izquierdo' },
            { label: 'RODILLAS DERECHA', voice: 'Rodillas a la derecha' },
            { label: 'RODILLAS IZQUIERDA', voice: 'Rodillas a la izquierda' },
            { label: 'CINTURA DERECHA', voice: 'Cintura a la derecha' },
            { label: 'CINTURA IZQUIERDA', voice: 'Cintura a la izquierda' },
            { label: 'BRAZO DERECHO', voice: 'Brazo derecho' },
            { label: 'BRAZO IZQUIERDO', voice: 'Brazo izquierdo' },
            { label: 'CUELLO ADELANTE Y ATRÁS', voice: 'Cuello adelante y atrás' },
            { label: 'CUELLO DER. E IZQ.', voice: 'Cuello derecha e izquierda' },
        ];

        const TRAINING_ZONES = ['PIERNAS', 'BRAZOS', 'TRONCO'];
        const DEFAULT_PARAMS = { entrenamiento: { action: 30, change: 5, rounds: 3, cycles: 4, rest: 60, zoneRest: 30 } };
        const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

        const whistle = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const duration = 1.6;
                const createOsc = (freq, type = 'sine', vol = 0.8) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    const mod = ctx.createOscillator();
                    const modGain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    mod.frequency.setValueAtTime(35, now); 
                    modGain.gain.setValueAtTime(freq * 0.07, now);
                    mod.connect(modGain); modGain.connect(osc.frequency);
                    osc.connect(gain); gain.connect(ctx.destination);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(vol, now + 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                    osc.start(now); mod.start(now);
                    osc.stop(now + duration); mod.stop(now + duration);
                };
                createOsc(3500); createOsc(3515, 'triangle', 0.4);
            } catch(e) {}
        };

        const voiceQueue = [];
        let voiceBusy = false;
        const flushVoice = () => {
            if (voiceBusy || voiceQueue.length === 0 || !window.speechSynthesis) return;
            voiceBusy = true;
            const text = voiceQueue.shift();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'es-ES'; msg.rate = 1.05;
            msg.onend = msg.onerror = () => { voiceBusy = false; flushVoice(); };
            window.speechSynthesis.speak(msg);
        };
        const speak = (text, interrupt = false) => {
            if (!window.speechSynthesis) return;
            if (interrupt) { window.speechSynthesis.cancel(); voiceQueue.length = 0; voiceBusy = false; }
            voiceQueue.push(text); flushVoice();
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('workouts');
            const [workouts, setWorkouts] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedWorkout, setSelectedWorkout] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u && !u.isAnonymous ? u : null);
                    setTimeout(() => setLoading(false), 500);
                });
                return unsub;
            }, []);

            useEffect(() => {
                if (!user) return;
                const base = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid);
                const unsubW = base.collection('workouts').onSnapshot(s => setWorkouts(s.docs.map(d => ({id:d.id,...d.data()}))));
                const unsubH = base.collection('history').onSnapshot(s => setHistory(s.docs.map(d => ({id:d.id,...d.data()}))));
                return () => { unsubW(); unsubH(); };
            }, [user]);

            const handleStartWorkout = (w) => {
                // DESPERTAR MOTOR DE VOZ AQUÍ (Interacción de usuario)
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const wakeUp = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(wakeUp);
                }
                setSelectedWorkout(w);
                setView('play');
            };

            if (loading) return <div className="h-full w-full flex items-center justify-center bg-slate-950"><div className="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"/></div>;
            if (!user) return <AuthView APP_TITLE={APP_TITLE} APP_VERSION={APP_VERSION}/>;

            return (
                <div className="h-full w-full flex flex-col bg-slate-950 text-white overflow-hidden">
                    {view !== 'play' && (
                        <header className="p-5 flex justify-between items-center bg-slate-900 border-b border-white/5 shrink-0">
                            <div onClick={() => setView('workouts')} className="cursor-pointer">
                                <h1 className="text-lg font-black italic uppercase text-orange-500">{APP_TITLE}</h1>
                                <p className="text-[8px] text-slate-500 font-bold uppercase">{user.email} | V{APP_VERSION}</p>
                            </div>
                            <button onClick={() => auth.signOut()} className="p-2 bg-red-500/10 rounded-xl text-red-500 font-bold text-[10px] px-4 uppercase italic">Salir</button>
                        </header>
                    )}
                    <main className="flex-1 relative flex flex-col min-h-0">
                        {view === 'workouts' && <WorkoutsView workouts={workouts} user={user} onStart={handleStartWorkout} onEdit={w => { setSelectedWorkout(w); setView('create'); }} onCreate={() => { setSelectedWorkout(null); setView('create'); }} />}
                        {view === 'avance' && <AvanceView history={history} />}
                        {view === 'create' && <CreateView user={user} workoutToEdit={selectedWorkout} onCancel={() => setView('workouts')} />}
                        {view === 'play' && <PlayerView workout={selectedWorkout} onExit={() => setView('workouts')} onComplete={(name, time) => { db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('history').add({ workoutName:name, totalTime:time, date: new Date().toISOString() }); setView('workouts'); }} />}
                    </main>
                    {view !== 'play' && (
                        <nav className="bg-slate-900 border-t border-white/5 p-4 flex justify-around items-center shrink-0">
                            <button onClick={() => setView('workouts')} className={`flex flex-col items-center text-[9px] font-black ${view==='workouts'?'text-orange-500':'text-slate-500'}`}><span className="text-xl mb-1">🏋️</span>RUTINAS</button>
                            <button onClick={() => setView('avance')} className={`flex flex-col items-center text-[9px] font-black ${view==='avance'?'text-orange-500':'text-slate-500'}`}><span className="text-xl mb-1">📊</span>AVANCE</button>
                        </nav>
                    )}
                </div>
            );
        }

        function AuthView({APP_TITLE, APP_VERSION}) {
            const [isReg, setIsReg] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const handle = async e => { e.preventDefault(); try { if (isReg) await auth.createUserWithEmailAndPassword(email.trim(), pass); else await auth.signInWithEmailAndPassword(email.trim(), pass); } catch (err) { alert("Error: " + err.message); } };
            return (
                <div className="h-screen flex flex-col items-center bg-slate-950 p-10 pt-20 text-center">
                    <div className="text-7xl mb-6">🏃‍♂️</div>
                    <h1 className="text-4xl font-black italic uppercase text-white">{APP_TITLE}</h1>
                    <p className="text-[8px] text-slate-600 uppercase mb-8">V {APP_VERSION}</p>
                    <form onSubmit={handle} className="space-y-4 w-full max-w-sm">
                        <input type="email" placeholder="EMAIL" className="w-full p-6 bg-slate-900 border border-white/5 rounded-[1.5rem] text-center text-white outline-none" value={email} onChange={e=>setEmail(e.target.value)} required />
                        <input type="password" placeholder="CLAVE" className="w-full p-6 bg-slate-900 border border-white/5 rounded-[1.5rem] text-center text-white outline-none" value={pass} onChange={e=>setPass(e.target.value)} required />
                        <button type="submit" className="w-full bg-orange-500 py-6 rounded-full font-black uppercase text-white active:scale-95 italic">{isReg?'Registrarse':'Entrar'}</button>
                    </form>
                    <button onClick={()=>setIsReg(!isReg)} className="mt-8 text-slate-500 text-[10px] uppercase font-black">{isReg?'Ya tengo cuenta':'Crear cuenta nueva'}</button>
                </div>
            );
        }

        function WorkoutsView({ workouts, user, onStart, onEdit, onCreate }) {
            return (
                <div className="flex-1 overflow-y-auto scrollbar-hide p-4 space-y-4 pb-32">
                    {workouts.length === 0 ? <div className="text-center p-12 opacity-30 italic font-black text-[10px]">Sin rutinas</div> : workouts.map(w => (
                        <div key={w.id} className="glass-card p-6 flex justify-between items-center shadow-lg">
                            <div className="flex-1 cursor-pointer" onClick={()=>onStart(w)}><h3 className="font-black uppercase italic text-sm">{w.name}</h3><span className="text-[10px] text-orange-400 font-black uppercase italic">Activa</span></div>
                            <div className="flex gap-2">
                                <button onClick={()=>onStart(w)} className="bg-white text-black p-4 rounded-xl"><IconPlay/></button>
                                <button onClick={()=>onEdit(w)} className="bg-slate-800 p-4 rounded-xl text-[10px] font-black uppercase italic">Edit</button>
                            </div>
                        </div>
                    ))}
                    <button onClick={onCreate} className="w-full bg-white/5 border border-white/10 py-6 rounded-full font-black uppercase italic">➕ NUEVA RUTINA</button>
                </div>
            );
        }

        function CreateView({ user, workoutToEdit, onCancel }) {
            const [name, setName] = useState(workoutToEdit?.name || '');
            const [phases, setPhases] = useState(() => workoutToEdit?.phases || DEFAULT_PARAMS);
            const [saving, setSaving] = useState(false);
            const update = (p, f, v) => setPhases(prev => ({...prev, [p]: {...prev[p], [f]: parseInt(v)||0}}));
            const save = async () => {
                if (!name.trim() || saving) return; setSaving(true);
                try {
                    const col = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('workouts');
                    const data = { name: name.toUpperCase(), phases, updatedAt: new Date().toISOString() };
                    if (workoutToEdit?.id) await col.doc(workoutToEdit.id).update(data); else await col.add({ ...data, createdAt: new Date().toISOString() });
                    onCancel();
                } catch(e) { alert("Error al guardar"); setSaving(false); }
            };
            const ENT_FIELDS = [{f:'action',label:'Acción (s)'},{f:'change',label:'Cambio (s)'},{f:'rounds',label:'Rondas'},{f:'cycles',label:'Ciclos'},{f:'rest',label:'Descanso Ciclo (s)'},{f:'zoneRest',label:'Descanso Zona (s)'}];
            return (
                <div className="flex-1 flex flex-col bg-slate-950 overflow-hidden text-center italic">
                    <header className="p-6 flex items-center border-b border-white/5 shrink-0"><button onClick={onCancel} className="p-3 bg-slate-900 rounded-2xl shadow-lg text-white">⬅</button><h2 className="text-xl font-black uppercase flex-1">Configurar</h2></header>
                    <div className="flex-1 overflow-y-auto scrollbar-hide p-4 space-y-6 pb-28">
                        <input type="text" placeholder="NOMBRE" className="w-full p-6 bg-slate-900 border border-white/10 rounded-[2rem] font-black uppercase text-center text-white outline-none" value={name} onChange={e=>setName(e.target.value)} />
                        <div className="glass-card p-6 space-y-4">
                            <span className="font-black uppercase text-xs text-orange-500 border-b border-white/5 block pb-2">Entrenamiento</span>
                            <div className="grid grid-cols-2 gap-4">{ENT_FIELDS.map(({f,label}) => <InputField key={f} label={label} val={(phases.entrenamiento?.[f] ?? DEFAULT_PARAMS.entrenamiento[f])} set={v=>update('entrenamiento',f,v)} />)}</div>
                        </div>
                    </div>
                    <div className="p-6 bg-slate-950 border-t border-white/5 shrink-0"><button onClick={save} className="w-full bg-white text-black py-6 rounded-full font-black uppercase">GUARDAR</button></div>
                </div>
            );
        }

        function InputField({ label, val, set }) { return ( <div className="flex flex-col items-center"> <span className="text-[8px] opacity-40 mb-2 uppercase">{label}</span> <input type="number" className="w-full bg-slate-800/40 p-4 rounded-xl text-center font-black text-white border border-white/5 outline-none" value={val} onChange={e=>set(e.target.value)} /> </div> ); }

        function PlayerView({ workout, onExit, onComplete }) {
            const [status, setStatus] = useState('ready'); // Iniciamos en ready para evitar botón gigante
            const [idx, setIdx] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [elapsed, setElapsed] = useState(0);
            const [steps, setSteps] = useState([]);
            const [wasPausedByHide, setWasPausedByHide] = useState(false);

            const lastSpokenKey = useRef('');
            const savedRef = useRef(false);
            const wakeLockRef = useRef(null);
            const videoRef = useRef(null);
            const startRef = useRef(null);
            const stepStartRef = useRef(null);
            const stepDurRef = useRef(0);
            const firstPlayDone = useRef(false);

            const requestStayAwake = async () => {
                if (videoRef.current && status === 'running') videoRef.current.play().catch(()=>{});
                try { if ('wakeLock' in navigator && !wakeLockRef.current) wakeLockRef.current = await navigator.wakeLock.request('screen'); } catch(e){}
            };
            const releaseStayAwake = () => {
                if (videoRef.current) videoRef.current.pause();
                if (wakeLockRef.current) { wakeLockRef.current.release(); wakeLockRef.current = null; }
            };

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden) { 
                        if (status === 'running') {
                            setStatus('paused'); 
                            setWasPausedByHide(true);
                        }
                        releaseStayAwake(); 
                    } else { 
                        if ('wakeLock' in navigator) requestStayAwake(); 
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [status]);

            useEffect(() => {
                if (status === 'running') requestStayAwake(); else releaseStayAwake();
                return () => releaseStayAwake();
            }, [status]);

            useEffect(() => {
                if (!workout) return;
                const ent = { ...DEFAULT_PARAMS.entrenamiento, ...(workout.phases?.entrenamiento || {}) };
                const s = [];
                s.push({ label:'PREPÁRATE', seconds:15, color:'bg-yellow-400', phase:'inicio' });
                WARMUP_STEPS.forEach((ws, i) => {
                    s.push({ label: ws.label, seconds: 30, color: 'bg-yellow-400', phase: 'calentamiento' });
                    if (i < WARMUP_STEPS.length - 1) s.push({ label: 'CAMBIO', seconds: 5, color: 'bg-yellow-300', phase: 'cambio-warmup', nextVoice: WARMUP_STEPS[i+1].voice });
                });
                s.push({ label:'DESCANSO', seconds:20, color:'bg-rose-400', phase:'post-warmup' });
                for (let cy = 1; cy <= ent.cycles; cy++) {
                    TRAINING_ZONES.forEach((zone, zi) => {
                        for (let r = 1; r <= ent.rounds; r++) {
                            s.push({ label: zone, seconds: ent.action, color: 'bg-emerald-400', phase: 'entrenamiento', r, tr: ent.rounds, cy, tc: ent.cycles });
                            if (r < ent.rounds) s.push({ label: 'CAMBIO', seconds: ent.change, color: 'bg-yellow-300', phase: 'cambio-ent', nextZone: zone });
                        }
                        if (zi < TRAINING_ZONES.length - 1) s.push({ label: 'DESCANSO', seconds: ent.zoneRest, color: 'bg-sky-500', phase: 'zone-rest', nextZone: TRAINING_ZONES[zi+1] });
                    });
                    if (cy < ent.cycles) s.push({ label: 'DESCANSO', seconds: ent.rest, color: 'bg-rose-500', phase: 'ciclo-rest', nextZone: TRAINING_ZONES[0] });
                }
                s.push({ label:'DESCANSO', seconds:30, color:'bg-blue-200', phase:'pre-stretches' });
                for (let i = 0; i < 16; i++) {
                    s.push({ label: '', seconds: 30, color: 'bg-blue-400', phase: 'estiramientos' });
                    if (i < 15) s.push({ label: 'CAMBIO', seconds: 10, color: 'bg-blue-200', phase: 'cambio-est' });
                }
                setSteps(s); setTimeLeft(s[0].seconds); stepDurRef.current = s[0].seconds;
            }, [workout]);

            const announceStep = (step, isFirst) => {
                const ph = step.phase;
                if (ph === 'calentamiento') {
                    if (isFirst) { speak('Calentamiento'); speak(step.voice || step.label.toLowerCase()); }
                    whistle();
                    return;
                }
                if (ph === 'entrenamiento' || ph === 'estiramientos') { whistle(); return; }
                if (ph === 'cambio-warmup') { speak('Cambio'); if (step.nextVoice) speak(step.nextVoice); return; }
                if (ph === 'post-warmup' || ph === 'zone-rest' || ph === 'ciclo-rest' || ph === 'pre-stretches') { speak('Descanso'); return; }
                if (ph === 'cambio-ent' || ph === 'cambio-est') { speak('Cambio'); return; }
            };

            const togglePlay = () => {
                if (!firstPlayDone.current) {
                    firstPlayDone.current = true;
                    // LÓGICA DE VOZ SIN DESFASE
                    speak('Prepárate', true);
                }
                setStatus(s => s === 'running' ? 'paused' : 'running');
                setWasPausedByHide(false);
            };

            useEffect(() => {
                let interval = null;
                if (status === 'running') {
                    if (!startRef.current) startRef.current = Date.now() - (elapsed * 1000);
                    if (!stepStartRef.current) stepStartRef.current = Date.now() - ((stepDurRef.current - timeLeft) * 1000);
                    interval = setInterval(() => {
                        const now = Date.now();
                        const totalSec = Math.floor((now - startRef.current) / 1000); setElapsed(totalSec);
                        const stepPassed = Math.floor((now - stepStartRef.current) / 1000);
                        const remaining = stepDurRef.current - stepPassed;
                        if (remaining > 0) {
                            setTimeLeft(remaining);
                            const vKey = `${idx}_${remaining}`;
                            if (lastSpokenKey.current !== vKey) {
                                lastSpokenKey.current = vKey;
                                if (idx === 0 && remaining === 12) speak('Calentamiento');
                                if (idx === 0 && remaining === 8) speak('Comencemos con Tobillo derecho');
                                if (steps[idx].phase === 'post-warmup' && remaining === 10) speak('Seguimos ejercitando. Piernas');
                                if (steps[idx].phase === 'cambio-ent'  && remaining === 4)  speak('Seguimos con ' + (steps[idx].nextZone||'').toLowerCase());
                                if (steps[idx].phase === 'zone-rest'   && remaining === 10) speak('Seguimos con ' + (steps[idx].nextZone||'').toLowerCase());
                                if (steps[idx].phase === 'ciclo-rest'  && remaining === 10) speak('Nuevo ciclo. Piernas');
                                if (steps[idx].phase === 'pre-stretches' && remaining === 10) speak('Estiramientos');
                                if (remaining <= 3) speak(String(remaining));
                            }
                        } else {
                            if (idx < steps.length - 1) {
                                const n = idx + 1; announceStep(steps[n], n === 1); setIdx(n); setTimeLeft(steps[n].seconds);
                                stepDurRef.current = steps[n].seconds; stepStartRef.current = Date.now(); lastSpokenKey.current = '';
                                if ('vibrate' in navigator) navigator.vibrate(150);
                            } else {
                                setStatus('finished'); speak('Excelente trabajo!');
                                if (!savedRef.current) { onComplete(workout.name, totalSec); savedRef.current = true; }
                            }
                        }
                    }, 250);
                } else {
                    startRef.current = null;
                    stepStartRef.current = null;
                }
                return () => clearInterval(interval);
            }, [status, idx, steps, timeLeft, elapsed]);

            if (status === 'finished') return <div className="h-screen flex flex-col items-center justify-center p-8 bg-slate-950 text-white text-center"><h1 className="text-5xl font-black italic mb-4">¡HECHO!</h1><button onClick={onExit} className="w-full max-w-sm bg-white text-black py-6 rounded-full font-black uppercase">Finalizar</button></div>;

            const curr = steps[idx];
            return (
                <div className={`h-screen flex flex-col transition-colors duration-700 ${curr?.color || 'bg-slate-950'} text-white`}>
                    <video ref={videoRef} loop muted playsInline style={{position:'absolute',width:'1px',height:'1px',opacity:0.01}}><source src="https://raw.githubusercontent.com/intel-iot-devkit/sample-videos/master/one-second-loop.mp4" type="video/mp4"/></video>
                    
                    <div className="bg-black/10 p-4 pt-10 flex justify-between items-center shrink-0 z-10">
                        <div className="leading-none text-left"><span className="text-[10px] font-black text-orange-500 uppercase">Tiempo</span><p className="text-xl font-black italic">{formatTime(elapsed)}</p></div>
                        <div className="text-center"><h2 className="text-[10px] font-black uppercase italic truncate max-w-[120px] tracking-tight">{workout?.name || 'Rutina'}</h2></div>
                        <button onClick={onExit} className="opacity-40 text-xl font-black px-2">✕</button>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center text-center px-4 min-h-0 relative">
                        {wasPausedByHide && status === 'paused' && (
                            <div className="absolute inset-0 z-40 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center">
                                <button onClick={togglePlay} className="bg-orange-500 p-10 rounded-full shadow-2xl active:scale-90"><IconPlay/></button>
                            </div>
                        )}
                        <h2 className="text-[11vw] font-black uppercase italic text-black/80 leading-none mb-2">{curr?.label || 'LISTO'}</h2>
                        <div className="timer-huge tabular-nums">{timeLeft}</div>
                    </div>

                    <div className="bg-slate-950 p-6 pb-10 flex flex-col items-center shrink-0">
                        <div className="w-full max-w-md grid grid-cols-3 items-center mb-6 text-center italic">
                            <div className="flex flex-col"><span className="text-[14vw] font-black text-sky-400 leading-none">{curr?.tr ? curr.tr - (curr.r||0) + 1 : '-'}</span><span className="text-[8px] opacity-40">Rondas</span></div>
                            <div className="flex justify-center">
                                <button onClick={togglePlay} className="w-20 h-20 rounded-full border-4 border-yellow-400 flex items-center justify-center active:scale-90">
                                    {status === 'running' ? <IconPause/> : <IconPlay/>}
                                </button>
                            </div>
                            <div className="flex flex-col"><span className="text-[14vw] font-black text-yellow-400 leading-none">{curr?.tc ? curr.tc - (curr.cy||0) + 1 : '-'}</span><span className="text-[8px] opacity-40">Ciclos</span></div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => { setIdx(0); setElapsed(0); setStatus('ready'); startRef.current=null; stepStartRef.current=null; lastSpokenKey.current=''; firstPlayDone.current=false; window.speechSynthesis.cancel(); if(steps[0]) { setTimeLeft(steps[0].seconds); stepDurRef.current=steps[0].seconds; } }} className="p-4 bg-slate-800 rounded-full active:scale-75"><IconRotate/></button>
                            <button onClick={() => { if (idx>0) { const pi=idx-1; setIdx(pi); setTimeLeft(steps[pi].seconds); stepDurRef.current=steps[pi].seconds; stepStartRef.current=null; lastSpokenKey.current=''; } }} className="p-4 bg-slate-800 rounded-full active:scale-75"><IconBack/></button>
                            <button onClick={() => { if (idx<steps.length-1) { const ni=idx+1; setIdx(ni); setTimeLeft(steps[ni].seconds); stepDurRef.current=steps[ni].seconds; stepStartRef.current=null; lastSpokenKey.current=''; } }} className="p-4 bg-slate-800 rounded-full active:scale-75"><IconForward/></button>
                        </div>
                    </div>
                </div>
            );
        }

        function AvanceView({ history }) {
            const [period, setPeriod] = useState('semana');
            const chartRef = useRef(null);
            const chartInst = useRef(null);
            const totalSec = history.reduce((a, h) => a + (h.totalTime || 0), 0);
            const getChartData = () => {
                const now = new Date();
                if (period === 'semana') {
                    const labels = Array.from({ length: 7 }, (_, i) => {
                        const d = new Date(); d.setDate(d.getDate() - 6 + i);
                        return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' });
                    });
                    const map = {};
                    history.forEach(h => {
                        const k = new Date(h.date).toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' });
                        map[k] = (map[k] || 0) + (h.totalTime || 0);
                    });
                    return { labels, data: labels.map(l => Math.floor((map[l] || 0) / 60)) };
                }
                if (period === 'mes') {
                    const weeks = Array.from({ length: 4 }, (_, i) => {
                        const start = new Date(); start.setDate(start.getDate() - 27 + i * 7);
                        start.setHours(0, 0, 0, 0);
                        const end = new Date(start); end.setDate(end.getDate() + 6);
                        end.setHours(23, 59, 59, 999);
                        return { label: `${start.getDate()}/${start.getMonth() + 1}`, start, end };
                    });
                    return {
                        labels: weeks.map(w => w.label),
                        data: weeks.map(w => Math.floor(history.filter(h => {
                            const d = new Date(h.date);
                            return d >= w.start && d <= w.end;
                        }).reduce((a, h) => a + (h.totalTime || 0), 0) / 60))
                    };
                }
                const labels = Array.from({ length: 12 }, (_, i) => new Date(now.getFullYear(), i, 1).toLocaleDateString('es-ES', { month: 'short' }));
                const data = Array.from({ length: 12 }, (_, i) => Math.floor(history.filter(h => {
                    const d = new Date(h.date);
                    return d.getMonth() === i && d.getFullYear() === now.getFullYear();
                }).reduce((a, h) => a + (h.totalTime || 0), 0) / 60));
                return { labels, data };
            };
            useEffect(() => {
                const ctx = chartRef.current?.getContext('2d');
                if (!ctx) return;
                if (chartInst.current) chartInst.current.destroy();
                const { labels, data } = getChartData();
                chartInst.current = new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets: [{ label: 'Minutos', data, backgroundColor: '#f97316', borderRadius: 8 }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } } } }
                });
                return () => chartInst.current?.destroy();
            }, [history, period]);
            const periodSessions = (() => {
                const from = new Date();
                if (period === 'semana') from.setDate(from.getDate() - 6);
                else if (period === 'mes') from.setDate(from.getDate() - 27);
                else from.setMonth(0, 1);
                from.setHours(0, 0, 0, 0);
                return history.filter(h => new Date(h.date) >= from);
            })();
            const periodSec = periodSessions.reduce((a, h) => a + (h.totalTime || 0), 0);
            return (
                <div className="flex-1 overflow-y-auto scrollbar-hide p-4 space-y-4 pb-28">
                    <div className="glass-card p-6 text-center">
                        <span className="text-[9px] opacity-40 block mb-1 uppercase">Tiempo Total Acumulado</span>
                        <span className="text-3xl font-black text-orange-500">{Math.floor(totalSec / 3600)}h {Math.floor((totalSec % 3600) / 60)}m</span>
                    </div>
                    <div className="flex gap-2">
                        {['semana', 'mes', 'año'].map(p => (
                            <button key={p} onClick={() => setPeriod(p)} className={`flex-1 py-3 rounded-xl font-black uppercase text-[10px] transition-all ${period === p ? 'bg-orange-500 text-white' : 'bg-white/5 text-slate-400'}`}>
                                {p}
                            </button>
                        ))}
                    </div>
                    <div className="glass-card p-5 flex justify-between items-center">
                        <div className="text-left"><span className="text-[9px] opacity-40 uppercase block">Esta {period}</span><span className="text-2xl font-black text-sky-400">{Math.floor(periodSec / 3600)}h {Math.floor((periodSec % 3600) / 60)}m</span></div>
                        <div className="text-right"><span className="text-[9px] opacity-40 uppercase block">Sesiones</span><span className="text-2xl font-black text-emerald-400">{periodSessions.length}</span></div>
                    </div>
                    <div className="glass-card p-4"><div style={{ height: '200px' }}><canvas ref={chartRef} /></div></div>
                    {periodSessions.length > 0 && (
                        <div className="glass-card p-4 space-y-3">
                            <span className="text-[9px] opacity-40 uppercase text-center block mb-1">Sesiones recientes</span>
                            {[...periodSessions].reverse().slice(0, 15).map((h, i) => (
                                <div key={i} className="flex justify-between items-center border-b border-white/5 pb-2 last:border-0 last:pb-0">
                                    <div><p className="text-xs font-black uppercase italic">{h.workoutName || 'Sesión'}</p><p className="text-[9px] text-slate-500">{new Date(h.date).toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' })}</p></div>
                                    <span className="text-orange-500 font-black text-xs">{formatTime(h.totalTime || 0)}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
